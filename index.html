<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For Phát ❤️</title>
<style>
body{
margin:0;
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
color:white;
text-align:center;
}
h1{
padding:20px;
line-height:1.8;
}
.heart{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}
@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>
<body>

<h1>
💖 Gửi Chú Chuột Nhắt 💖<br><br>
Cảm ơn anh đã đến.<br>
Em Yêu Anh ❤️
</h1>

<script>
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},200);
</script>

</body>
</html>
